<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header></header>

    <main>
        <section class="about-podcast">

            <div>
                <h1>Now playing</h1>
                <img class="vynil-png" src="./assets/img/vinyl.png" alt="png-of-vynil">
            </div>
            <img class="cover" src="./assets/img/Smartless-cover.jpg" alt="Cover of podcast Smartless">
            <div class="podcast-title-container">
                <h2>Smartless</h2>
                <h2>RE-RELEASE: Emma Stone</h2>
            </div>
        </section>
        <section class="podcast">
            <div class="transcript-container">
                <div id="podcast-transcript"></div>
            </div>
            <audio src="./assets/audio/resolve.mp3" id="podcast-audio" controls>
                <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/track -->
                <track default kind="captions" label="captions" srclang="en" src="./assets/transcripts/transcript.vtt">
            </audio>

        </section>

        <section class="speaker-section">
            <ul id="speaker">
                <li id="speaker-1" class="speaker"><img src="./assets/img/jason.webp" alt="profile-picture-Jason"></li>
                <li><p>Jason</p></li>
                <li id="speaker-2" class="speaker"><img src="./assets/img/sean.jpg" alt="profile-picture-Sean"></li>
                <li><p>Sean</p></li>
                <li id="speaker-3" class="speaker"><img src="./assets/img/will.jpg" alt="profile-picture-Will"></li>
                <li><p>Will</p></li>
            </ul>
        </section>
    </main>


    <footer>
        
    </footer>


    <script src="./script.js"></script>
</body>
</html>
